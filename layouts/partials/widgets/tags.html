<!-- tags -->
{{ if isset site.Taxonomies "tags" }}
  {{ if not (eq (len site.Taxonomies.tags) 0) }}
    <div class="mb-8">
      <h5 class="mb-6 text-text-dark dark:text-darkmode-text-dark">{{ T "tags" | default "Tags" }}</h5>
      <div class="rounded bg-theme-light p-6 dark:bg-darkmode-theme-light">
        <ul>
          {{ range $name, $items := site.Taxonomies.tags }}
            <li class="inline-block">
              <a
                class="{{ if (and (eq $.Page.Kind `term`) (eq $.Page.Type `tags`) (eq $.Page.Title .Page.Title)) }}
                  active
                {{ end }} m-1 block rounded bg-white px-3 py-1 text-text hover:bg-primary hover:text-white dark:bg-darkmode-body dark:text-darkmode-text dark:hover:bg-darkmode-primary dark:hover:text-darkmode-text-dark"
                href="{{ .Page.RelPermalink }}">
                {{ .Page.Title }}
              </a>
            </li>
          {{ end }}
        </ul>
      </div>
    </div>
  {{ end }}
{{ end }}
