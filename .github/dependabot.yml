# Dependabot updates for Hugo modules, npm, and GitHub Actions
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    ignore:
      # Tailwind v4 and tailwind-bootstrap-grid v7 require major migration;
      # Hugoplate theme is built for Tailwind v3
      - dependency-name: "tailwindcss"
      - dependency-name: "tailwind-bootstrap-grid"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
